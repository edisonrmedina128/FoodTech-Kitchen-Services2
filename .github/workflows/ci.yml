name: CI Pipeline

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main, develop, 'feature/**']

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_DB: foodtech_db
          POSTGRES_USER: foodtech_user
          POSTGRES_PASSWORD: foodtech_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U foodtech_user -d foodtech_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle' # Esto ahora sí será útil
      
      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Wait for PostgreSQL
        run: |
          until docker exec postgres pg_isready -U foodtech_user -d foodtech_db; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done
        
      # UN SOLO PASO para todo: compila, testea, genera reporte y verifica cobertura
      - name: Build, Test and Verify Coverage
        run: ./gradlew build jacocoTestReport jacocoTestCoverageVerification
        
      # Publicar resultados de tests (JUnit)
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: build/test-results/test/*.xml
          
      # Publicar el reporte HTML para que puedas descargarlo y verlo
      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: build/reports/jacoco/test/html/

      # El resumen visual en el PR (esto es lo más valioso)
      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: madrapps/jacoco-report@v1.6.1
        with:
          paths: build/reports/jacoco/test/jacocoTestReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 70
          min-coverage-changed-files: 70