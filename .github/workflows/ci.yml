name: CI Pipeline

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Gradle version
        run: ./gradlew --version --no-daemon

  lint:
    runs-on: ubuntu-latest
    needs: preflight
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run static analysis
        run: ./gradlew check --no-daemon

  unit-tests:
    runs-on: ubuntu-latest
    needs: [preflight, lint]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew unitTest jacocoUnitTestReport --no-daemon

      - name: Upload unit test reports
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: |
            build/test-results/unitTest
            build/reports/jacoco/jacocoUnitTestReport

  component-tests:
    runs-on: ubuntu-latest
    needs: [preflight, lint]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run component tests
        run: ./gradlew componentTest jacocoComponentTestReport --no-daemon

      - name: Upload component test reports
        uses: actions/upload-artifact@v4
        with:
          name: component-test-results
          path: |
            build/test-results/componentTest
            build/reports/jacoco/jacocoComponentTestReport

  integration-tests:
    runs-on: ubuntu-latest
    needs: [preflight, lint]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run integration tests
        run: ./gradlew integrationTest jacocoIntegrationTestReport --no-daemon

      - name: Upload integration test reports
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: |
            build/test-results/integrationTest
            build/reports/jacoco/jacocoIntegrationTestReport

  sbom:
    runs-on: ubuntu-latest
    needs: preflight
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Generate CycloneDX SBOM
        run: ./gradlew cyclonedxBom --no-daemon

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: build/reports/bom

  sast:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  docker-build:
    runs-on: ubuntu-latest
    needs: [unit-tests, component-tests, integration-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            --build-arg VCS_REF=${{ github.sha }} \
            --build-arg VERSION=${{ github.sha }} \
            --build-arg VCS_URL=${{ github.server_url }}/${{ github.repository }} \
            -t demo:latest .

      - name: Scan Docker image with Trivy (SARIF)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: demo:latest
          format: sarif
          output: trivy-report.sarif
          severity: CRITICAL,HIGH
          exit-code: 0

      - name: Scan Docker image with Trivy (table)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: demo:latest
          format: table
          severity: CRITICAL,HIGH
          exit-code: 0

      - name: Upload Trivy report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-security-report
          path: trivy-report.sarif

      - name: Run container
        run: |
          docker run -d --name foodtech-kitchen-ci -p 8080:8080 \
            -e SPRING_DATASOURCE_URL=jdbc:h2:mem:testdb \
            -e SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.h2.Driver \
            -e SPRING_DATASOURCE_USERNAME=sa \
            -e SPRING_DATASOURCE_PASSWORD= \
            -e SPRING_JPA_HIBERNATE_DDL_AUTO=update \
            demo:latest

      - name: Smoke test
        run: |
          for i in $(seq 1 20); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/ || true)
            if [ "$code" != "000" ]; then
              echo "Service responded with status $code"
              exit 0
            fi
            sleep 2
          done
          echo "Service did not respond on port 8080"
          docker logs foodtech-kitchen-ci
          exit 1

      - name: Cleanup container
        if: always()
        run: |
          docker rm -f foodtech-kitchen-ci

  artifact-upload:
    runs-on: ubuntu-latest
    needs: [unit-tests, component-tests, integration-tests, docker-build]
    steps:
      - name: Download test artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Upload consolidated test reports
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: artifacts