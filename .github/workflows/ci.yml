name: CI Pipeline

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
  pull_request:
    branches:
      - main
      - develop
      - 'feature/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Clean build
      run: ./gradlew clean --no-build-cache
      
    - name: Build project
      run: ./gradlew build -x test
      
    - name: Run tests with coverage
      run: ./gradlew test jacocoTestReport --rerun-tasks
      
    - name: Display coverage summary
      if: always()
      run: |
        if [ -f build/reports/jacoco/test/html/index.html ]; then
          echo "## 📊 Test Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Extract coverage percentages from the HTML report
          INSTRUCTION=$(grep -oP 'Total.*?(\d+)%' build/reports/jacoco/test/html/index.html | grep -oP '\d+%' | head -1 || echo "N/A")
          BRANCH=$(grep -oP 'Total.*?(\d+)%' build/reports/jacoco/test/html/index.html | grep -oP '\d+%' | tail -1 || echo "N/A")
          
          echo "| Metric | Coverage |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| Instructions | $INSTRUCTION |" >> $GITHUB_STEP_SUMMARY
          echo "| Branches | $BRANCH |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📁 Full report available in artifacts" >> $GITHUB_STEP_SUMMARY
        else
          echo "⚠️ Coverage report not found" >> $GITHUB_STEP_SUMMARY
        fi
      
    - name: Verify test coverage
      run: ./gradlew jacocoTestCoverageVerification --rerun-tasks
      
    - name: Generate coverage report
      if: always()
      run: |
        echo "## 📋 Detailed Coverage by Package" >> $GITHUB_STEP_SUMMARY
        if [ -f build/reports/jacoco/test/jacocoTestReport.xml ]; then
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          ./gradlew jacocoTestReport --console=plain 2>&1 | grep -A 50 "jacoco" || echo "Coverage details in artifacts"
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        fi

    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: build/test-results/test/*.xml
        
    - name: Upload coverage report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: build/reports/jacoco/test/html/
        
    - name: Comment coverage on PR
      if: github.event_name == 'pull_request'
      uses: madrapps/jacoco-report@v1.6.1
      with:
        paths: build/reports/jacoco/test/jacocoTestReport.xml
        token: ${{ secrets.GITHUB_TOKEN }}
        min-coverage-overall: 70
        min-coverage-changed-files: 70
