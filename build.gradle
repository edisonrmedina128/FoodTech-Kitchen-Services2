plugins {
    id 'java'
    id 'org.springframework.boot' version '3.2.1'
    id 'io.spring.dependency-management' version '1.1.4'
    id 'jacoco'
    id 'org.cyclonedx.bom' version '1.8.2'
    id 'org.owasp.dependencycheck' version '9.2.0'
}

group = 'com.foodtech'
version = '0.0.1-SNAPSHOT'
description = 'FoodTech Kitchen Service'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}

configurations {
    compileOnly {
        extendsFrom annotationProcessor
    }
}

repositories {
    mavenCentral()
}

dependencies {
    // Spring Boot Starters
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
    implementation 'org.springframework.boot:spring-boot-starter-security'
    implementation 'org.springframework.boot:spring-boot-starter-validation'

    // ✅ NUEVO: Project Reactor para programación reactiva
    implementation 'io.projectreactor:reactor-core:3.6.0'

    // Jackson (explícito para IDE)
    implementation 'com.fasterxml.jackson.core:jackson-databind'
    implementation 'com.fasterxml.jackson.datatype:jackson-datatype-jsr310'
    implementation 'io.jsonwebtoken:jjwt-api:0.11.5'
    runtimeOnly 'io.jsonwebtoken:jjwt-impl:0.11.5'
    runtimeOnly 'io.jsonwebtoken:jjwt-jackson:0.11.5'
    
    // Database
    runtimeOnly 'org.postgresql:postgresql'
    runtimeOnly 'com.h2database:h2'
    
    // Lombok
    compileOnly 'org.projectlombok:lombok'
    annotationProcessor 'org.projectlombok:lombok'
    
    // Testing
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testImplementation 'org.springframework.security:spring-security-test'
    testImplementation 'io.projectreactor:reactor-test'
    testImplementation 'io.jsonwebtoken:jjwt-api:0.11.5'
    testRuntimeOnly 'io.jsonwebtoken:jjwt-impl:0.11.5'
    testRuntimeOnly 'io.jsonwebtoken:jjwt-jackson:0.11.5'

    // Lombok for tests
    testCompileOnly 'org.projectlombok:lombok'
    testAnnotationProcessor 'org.projectlombok:lombok'
}

tasks.named('test') {
    useJUnitPlatform()
    finalizedBy jacocoTestReport
}

tasks.named('bootJar') {
    archiveFileName = 'app.jar'
}

tasks.withType(Test).configureEach {
    useJUnitPlatform()
    reports {
        junitXml.required = true
        html.required = true
    }
}

tasks.register('unitTest', Test) {
    description = 'Runs unit tests.'
    group = 'verification'
    testClassesDirs = sourceSets.test.output.classesDirs
    classpath = sourceSets.test.runtimeClasspath
    useJUnitPlatform {
        includeTags 'unit'
    }
}

tasks.register('componentTest', Test) {
    description = 'Runs component tests.'
    group = 'verification'
    testClassesDirs = sourceSets.test.output.classesDirs
    classpath = sourceSets.test.runtimeClasspath
    useJUnitPlatform {
        includeTags 'component'
    }
}

tasks.register('integrationTest', Test) {
    description = 'Runs integration tests.'
    group = 'verification'
    testClassesDirs = sourceSets.test.output.classesDirs
    classpath = sourceSets.test.runtimeClasspath
    useJUnitPlatform {
        includeTags 'integration'
    }
    systemProperty 'spring.profiles.active', 'test'
}

tasks.register('blackboxTest', Test) {
    description = 'Runs blackbox tests.'
    group = 'verification'
    testClassesDirs = sourceSets.test.output.classesDirs
    classpath = sourceSets.test.runtimeClasspath
    useJUnitPlatform {
        includeTags 'blackbox'
    }
}

jacoco {
    toolVersion = "0.8.11"
}

def jacocoExcludedClasses = [
    '**/KitchenServiceApplication.class',
    '**/KitchenServiceApplication$*.class',
    '**/infrastructure/config/**',
    '**/*JpaRepository.class'
]

def jacocoClassDirs = sourceSets.main.output.asFileTree.matching {
    exclude jacocoExcludedClasses
}

tasks.register('jacocoUnitTestReport', JacocoReport) {
    dependsOn tasks.named('unitTest')
    executionData(tasks.named('unitTest'))
    sourceDirectories.setFrom(sourceSets.main.allSource.srcDirs)
    classDirectories.setFrom(jacocoClassDirs)
    reports {
        xml.required = true
        html.required = true
        csv.required = false
    }
}

tasks.register('jacocoComponentTestReport', JacocoReport) {
    dependsOn tasks.named('componentTest')
    executionData(tasks.named('componentTest'))
    sourceDirectories.setFrom(sourceSets.main.allSource.srcDirs)
    classDirectories.setFrom(jacocoClassDirs)
    reports {
        xml.required = true
        html.required = true
        csv.required = false
    }
}

tasks.register('jacocoIntegrationTestReport', JacocoReport) {
    dependsOn tasks.named('integrationTest')
    executionData(tasks.named('integrationTest'))
    sourceDirectories.setFrom(sourceSets.main.allSource.srcDirs)
    classDirectories.setFrom(jacocoClassDirs)
    reports {
        xml.required = true
        html.required = true
        csv.required = false
    }
}

jacocoTestReport {
    dependsOn test
    reports {
        xml.required = true
        html.required = true
        csv.required = false
    }

    // Mueve la configuración aquí, fuera de doFirst
    // Usamos afterEvaluate para asegurar que los directorios por defecto ya existen antes de filtrar
    classDirectories.setFrom(jacocoClassDirs)
}

jacocoTestCoverageVerification {
    dependsOn jacocoTestReport
    
    violationRules {
        rule {
            limit {
                minimum = 0.75
            }
        }
    }
    
    // Mismo cambio aquí: Eliminar doFirst y usar afterEvaluate
    classDirectories.setFrom(jacocoClassDirs)
}

check.dependsOn jacocoTestCoverageVerification

dependencyCheck {
    format = 'HTML'
    failBuildOnCVSS = 11

    nvd {
        apiKey = System.getenv('NVD_API_KEY')
        delay = 8000
    }
}

cyclonedxBom {
    includeConfigs = ['runtimeClasspath']
    projectType = 'application'
    schemaVersion = '1.5'
    outputFormat = 'json'
    outputName = 'bom'
}